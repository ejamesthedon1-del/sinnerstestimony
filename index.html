<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Sinners Testimony</title>
  <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #ffffff;
      --text: #000000;
      --text-muted: #525252;
      --border: rgba(0, 0, 0, 0.12);
      --input-border: #000000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Lock screen overlay */
    .lock-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-bottom: 4rem;
      position: relative;
    }

    .brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .brand-name {
      font-family: 'Satoshi', sans-serif;
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
      color: var(--text);
      text-transform: uppercase;
    }

    .tagline {
      font-family: 'Satoshi', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-weight: 400;
    }

    .coming-soon-badge {
      display: inline-block;
      font-family: 'Satoshi', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text);
      border: 1px solid var(--text);
      padding: 0.4rem 1.2rem;
      margin-bottom: 3rem;
    }

    .signup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
    }

    .signup-card h2 {
      font-family: 'Satoshi', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .signup-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* Klaviyo form container - minimal styling to avoid conflicts */
    #klaviyo-form-container {
      display: block;
    }

    .klaviyo-embed-wrapper {
      min-height: 250px;
      overflow: visible !important;
    }

    /* Isolate Klaviyo form from our reset */
    .klaviyo-form-VksnpD,
    .klaviyo-form-VksnpD * {
      box-sizing: border-box !important;
    }

    /* Ensure Klaviyo wrapper and its form are visible */
    .klaviyo-form-VksnpD form {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    /* Force visibility - Klaviyo may inject with hidden/transparent styles */
    .klaviyo-form-VksnpD input,
    .klaviyo-form-VksnpD input[type="email"],
    .klaviyo-form-VksnpD input[type="tel"],
    .klaviyo-form-VksnpD button,
    .klaviyo-form-VksnpD [type="submit"],
    .klaviyo-embed-wrapper input,
    .klaviyo-embed-wrapper button {
      opacity: 1 !important;
      visibility: visible !important;
      display: block !important;
      width: 100% !important;
      max-width: 100% !important;
      min-height: 44px !important;
      padding: 12px 16px !important;
      margin: 8px 0 !important;
      font-family: 'Satoshi', sans-serif !important;
      font-size: 16px !important;
      color: #000000 !important;
      background: #ffffff !important;
      border: 1px solid #000000 !important;
      -webkit-appearance: none !important;
      appearance: none !important;
    }

    .klaviyo-form-VksnpD button,
    .klaviyo-form-VksnpD [type="submit"],
    .klaviyo-embed-wrapper button {
      background: #000000 !important;
      color: #ffffff !important;
      border-color: #000000 !important;
      cursor: pointer !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.05em !important;
    }

    .klaviyo-form-VksnpD input::placeholder,
    .klaviyo-embed-wrapper input::placeholder {
      color: #525252 !important;
      opacity: 1 !important;
    }

    .form-success {
      display: none;
      text-align: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid var(--border);
    }

    .form-success.visible {
      display: block;
    }

    .form-fallback {
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    .form-success p {
      color: var(--text);
      margin: 0;
      font-size: 1rem;
      font-weight: 500;
    }

    .page-footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
    }

    .page-footer a {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
    }

    .page-footer a:hover {
      color: var(--text);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="lock-screen">
    <div class="brand">
      <div class="coming-soon-badge">Coming Soon</div>
      <h1 class="brand-name">Sinners<br>Testimony</h1>
      <p class="tagline">Be the first to know when we open.</p>
    </div>

    <div class="signup-card">
      <h2>Join the list</h2>
      <p>Sign up for early access, drops, and exclusives.</p>

      <!-- 
        KLAVIYO INTEGRATION OPTION 1: Custom form
        Replace the content below with your Klaviyo embed code from:
        Klaviyo → Sign-up forms → Create form → Embed → Copy code
        
        In Klaviyo's form builder, add:
        - Email field (required)
        - Phone number field (for SMS)
        - SMS consent checkbox/disclosure
      -->
      <div id="klaviyo-form-container" class="klaviyo-embed-wrapper">
        <div class="klaviyo-form-VksnpD"></div>
        <div id="form-fallback" class="form-fallback" style="display: none;">
          <p style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;">Having trouble? Email us to join the list: <a href="mailto:hello@sinnerstestimony.com" style="color: var(--text); font-weight: 500;">hello@sinnerstestimony.com</a></p>
        </div>
        <div id="form-success" class="form-success">
          <p>✓ You&rsquo;re on the list. We&rsquo;ll notify you when we open.</p>
        </div>
      </div>
    </div>

    <footer class="page-footer">
      <a href="/privacy.html">Privacy Policy</a>
    </footer>
  </div>

  <!-- Klaviyo onsite tracking -->
  <script async type="text/javascript" src="https://static.klaviyo.com/onsite/js/YkhQZ2/klaviyo.js?company_id=YkhQZ2"></script>
  <script type="text/javascript">
    !function(){if(!window.klaviyo){window._klOnsite=window._klOnsite||[];try{window.klaviyo=new Proxy({},{get:function(n,i){return"push"===i?function(){var n;(n=window._klOnsite).push.apply(n,arguments)}:function(){for(var n=arguments.length,o=new Array(n),w=0;w<n;w++)o[w]=arguments[w];var t="function"==typeof o[o.length-1]?o.pop():void 0,e=new Promise((function(n){window._klOnsite.push([i].concat(o,[function(i){t&&t(i),n(i)}]))}));return e}}})}catch(n){window.klaviyo=window.klaviyo||[],window.klaviyo.push=function(){var n;(n=window._klOnsite).push.apply(n,arguments)}}}}();
  </script>
  <script type="text/javascript">
    window.addEventListener("klaviyoForms", function(e) {
      if (e.detail.type === "submit") {
        var form = document.querySelector(".klaviyo-form-VksnpD");
        var success = document.getElementById("form-success");
        if (form) form.style.display = "none";
        if (success) success.classList.add("visible");
      }
    });
    // Show fallback if Klaviyo form doesn't load within 4 seconds (e.g. 403)
    setTimeout(function() {
      var container = document.querySelector(".klaviyo-form-VksnpD");
      var fallback = document.getElementById("form-fallback");
      var hasInputs = container && (container.querySelector("input") || container.querySelector("button"));
      if (container && !hasInputs && fallback) fallback.style.display = "block";
    }, 4000);
  </script>
</body>
</html>
