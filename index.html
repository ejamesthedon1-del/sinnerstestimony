<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Sinners Testimony</title>
  <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #ffffff;
      --text: #000000;
      --text-muted: #525252;
      --border: rgba(0, 0, 0, 0.12);
      --input-border: #000000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Lock screen overlay */
    .lock-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-bottom: 4rem;
      position: relative;
    }

    .brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .brand-name {
      font-family: 'Satoshi', sans-serif;
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
      color: var(--text);
      text-transform: uppercase;
    }

    .tagline {
      font-family: 'Satoshi', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-weight: 400;
    }

    .coming-soon-badge {
      display: inline-block;
      font-family: 'Satoshi', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text);
      border: 1px solid var(--text);
      padding: 0.4rem 1.2rem;
      margin-bottom: 3rem;
    }

    .signup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
    }

    .signup-card h2 {
      font-family: 'Satoshi', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .signup-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* Klaviyo form container */
    #klaviyo-form-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #klaviyo-form-container input,
    #klaviyo-form-container button {
      font-family: 'Satoshi', sans-serif;
      font-size: 1rem;
    }

    #klaviyo-form-container input,
    #klaviyo-form-container input[type="email"],
    #klaviyo-form-container input[type="tel"],
    .klaviyo-embed-wrapper input {
      display: block !important;
      visibility: visible !important;
      background: #ffffff !important;
      border: 1px solid var(--input-border) !important;
      color: var(--text) !important;
      padding: 0.9rem 1rem !important;
      width: 100% !important;
      min-height: 48px !important;
      opacity: 1 !important;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #klaviyo-form-container input::placeholder {
      color: var(--text-muted);
      opacity: 0.8;
    }

    #klaviyo-form-container input:focus {
      outline: none;
      border-color: var(--text);
      box-shadow: 0 0 0 1px var(--text);
    }

    #klaviyo-form-container button {
      background: var(--text);
      border: none;
      color: white;
      padding: 0.9rem 1.5rem;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.15s;
    }

    #klaviyo-form-container button:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    #klaviyo-form-container button:active {
      transform: translateY(0);
    }

    .sms-disclosure {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .sms-disclosure a {
      color: var(--text);
      text-decoration: none;
    }

    .sms-disclosure a:hover {
      text-decoration: underline;
    }

    .klaviyo-embed-wrapper {
      min-height: 200px;
    }

    .klaviyo-embed-wrapper iframe,
    .klaviyo-embed-wrapper form {
      width: 100%;
    }

    /* Ensure Klaviyo form inputs are visible - targets various Klaviyo structures */
    .klaviyo-form-TCbZ47 input,
    .klaviyo-embed-wrapper input[type="text"],
    .klaviyo-embed-wrapper input[type="email"],
    .klaviyo-embed-wrapper input[type="tel"] {
      display: block !important;
      visibility: visible !important;
      background: #ffffff !important;
      border: 1px solid var(--input-border) !important;
      color: var(--text) !important;
      -webkit-appearance: none !important;
      appearance: none !important;
    }

    .form-success {
      display: none;
      text-align: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid var(--border);
    }

    .form-success.visible {
      display: block;
    }

    .form-success p {
      color: var(--text);
      margin: 0;
      font-size: 1rem;
      font-weight: 500;
    }

    .page-footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
    }

    .page-footer a {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
    }

    .page-footer a:hover {
      color: var(--text);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="lock-screen">
    <div class="brand">
      <div class="coming-soon-badge">Coming Soon</div>
      <h1 class="brand-name">Sinners<br>Testimony</h1>
      <p class="tagline">Be the first to know when we open.</p>
    </div>

    <div class="signup-card">
      <h2>Join the list</h2>
      <p>Sign up for early access, drops, and exclusives.</p>

      <!-- 
        KLAVIYO INTEGRATION OPTION 1: Custom form
        Replace the content below with your Klaviyo embed code from:
        Klaviyo → Sign-up forms → Create form → Embed → Copy code
        
        In Klaviyo's form builder, add:
        - Email field (required)
        - Phone number field (for SMS)
        - SMS consent checkbox/disclosure
      -->
      <div id="klaviyo-form-container" class="klaviyo-embed-wrapper">
        <div class="klaviyo-form-TCbZ47"></div>
        <div id="form-success" class="form-success">
          <p>✓ You&rsquo;re on the list. We&rsquo;ll notify you when we open.</p>
        </div>
      </div>
    </div>

    <footer class="page-footer">
      <a href="/privacy.html">Privacy Policy</a>
    </footer>
  </div>

  <!-- Klaviyo onsite tracking -->
  <script async type="text/javascript" src="https://static.klaviyo.com/onsite/js/YkhQZ2/klaviyo.js?company_id=YkhQZ2"></script>
  <script type="text/javascript">
    !function(){if(!window.klaviyo){window._klOnsite=window._klOnsite||[];try{window.klaviyo=new Proxy({},{get:function(n,i){return"push"===i?function(){var n;(n=window._klOnsite).push.apply(n,arguments)}:function(){for(var n=arguments.length,o=new Array(n),w=0;w<n;w++)o[w]=arguments[w];var t="function"==typeof o[o.length-1]?o.pop():void 0,e=new Promise((function(n){window._klOnsite.push([i].concat(o,[function(i){t&&t(i),n(i)}]))}));return e}}})}catch(n){window.klaviyo=window.klaviyo||[],window.klaviyo.push=function(){var n;(n=window._klOnsite).push.apply(n,arguments)}}}}();
  </script>
  <script type="text/javascript">
    window.addEventListener("klaviyoForms", function(e) {
      if (e.detail.type === "submit") {
        var form = document.querySelector(".klaviyo-form-TCbZ47");
        var success = document.getElementById("form-success");
        if (form) form.style.display = "none";
        if (success) success.classList.add("visible");
      }
    });
  </script>
</body>
</html>
